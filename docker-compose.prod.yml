version: "3.9"

services:
    app:
        build: .
        environment:
            DATABASE_URL: postgresql://artem:123@db:5432/sudoku0311_prod
        depends_on:
            - db
        ports:
            - "3000:3000"
        restart: always

    db:
        image: postgres:15
        restart: always
        environment:
            POSTGRES_USER: artem
            POSTGRES_PASSWORD: 123
            POSTGRES_DB: sudoku0311_prod
        volumes:
            - postgres_data:/var/lib/postgresql/data

volumes:
    postgres_data:
